<div class="modal-header">
  <h4 class="modal-title">Connexion</h4>
  <button type="button" class="btn-close" (click)="modalService.dismissAll()"></button>
</div>

<div class="modal-body">
  <div class="login-container">
    <!-- Formulaire à gauche -->
    <div class="login-form-section">
      <div class="login-header">
        <h5 class="login-subtitle">Bon retour parmi nous !</h5>
      </div>

      <!-- Message d'erreur -->
      <div *ngIf="showError" class="alert alert-danger alert-dismissible fade show" role="alert">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
        <button type="button" class="btn-close" (click)="showError = false"></button>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit($event)">

        <!-- Email -->
        <div class="form-group">
          <label for="email">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            Email
          </label>
          <input
            type="email"
            id="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            placeholder="votre@email.com"
            [class.is-invalid]="email.length > 0 && !isEmailValid()"
            [class.is-valid]="email.length > 0 && isEmailValid()"
            required
          >
          <div *ngIf="email.length > 0 && !isEmailValid()" class="invalid-feedback">
            Veuillez entrer une adresse email valide
          </div>
        </div>

        <!-- Mot de passe -->
        <div class="form-group mt-3">
          <label for="password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Mot de passe
          </label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              class="form-control"
              [(ngModel)]="password"
              name="password"
              placeholder="Votre mot de passe"
              required
            >
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
              <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Options -->
        <div class="form-options mt-3">
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="remember"
              [(ngModel)]="rememberMe"
              name="remember"
            >
            <label class="form-check-label" for="remember">
              Se souvenir de moi
            </label>
          </div>
          <a class="forgot-password" (click)="onForgotPassword()">Mot de passe oublié ?</a>
        </div>

        <!-- Bouton submit -->
        <button
          type="submit"
          class="btn btn-success w-100 mt-4"
          [disabled]="!isFormValid() || isSubmitting"
        >
          <span *ngIf="!isSubmitting">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Se connecter
          </span>
          <span *ngIf="isSubmitting">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Connexion en cours...
          </span>
        </button>

      </form>

      <div class="register-link">
        <p>Vous n'avez pas de compte ? <a (click)="openRegister()" style="cursor: pointer;">S'inscrire</a></p>
      </div>
    </div>

    <!-- Photo inspirante à droite -->
    <div class="login-image-section">
      <div class="image-wrapper">
        <img
          src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=500&h=700&fit=crop"
          alt="Bienvenue sur ShopMada"
        >
        <div class="image-overlay">
          <div class="overlay-content">
            <div class="icon-badge">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <h3>Heureux de vous revoir !</h3>
            <p>Accédez à votre compte et profitez de tous nos avantages</p>
            <div class="stats-list">
              <div class="stat-item">
                <div class="stat-number">2000+</div>
                <div class="stat-label">Clients actifs</div>
              </div>
              <div class="stat-item">
                <div class="stat-number">500+</div>
                <div class="stat-label">Produits</div>
              </div>
              <div class="stat-item">
                <div class="stat-number">98%</div>
                <div class="stat-label">Satisfaction</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-footer">
  <button class="btn btn-outline-secondary" (click)="modalService.dismissAll()">Fermer</button>
</div>
