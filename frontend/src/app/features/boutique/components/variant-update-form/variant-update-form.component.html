<div class="modal-overlay">
  <div class="modal-container">

    <!-- Header -->
    <div class="modal-header">
      <div class="header-content">
        <div class="header-icon">
          <i class="fas fa-edit"></i>
        </div>
        <div class="header-text">
          <h2 class="modal-title">Modifier Variant</h2>
          <p class="modal-subtitle">{{ product.product.name }} - {{ variant.code }}</p>
        </div>
      </div>
      <button class="btn-close" (click)="onClose()" type="button">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Erreur -->
    <div *ngIf="errorMessage" class="alert alert-danger m-3">
      <i class="fas fa-exclamation-triangle"></i>
      {{ errorMessage }}
    </div>

    <!-- Body -->
    <div class="modal-body">
      <form class="form-produit">

        <!-- Info Produit (Read-only) -->
        <div class="form-section info-section">
          <div class="product-info-readonly">
            <img *ngIf="product.product.image" [src]="product.product.image" [alt]="product.product.name">
            <div>
              <h4>{{ product.product.name }}</h4>
              <span class="code">{{ product.product.code }}</span>
            </div>
          </div>
        </div>

        <!-- Section Informations -->
        <div class="form-section">
          <div class="form-row">
            <div class="form-group half">
              <label class="form-label">
                <i class="fas fa-barcode"></i>
                Code Variant
              </label>
              <div class="input-wrapper">
                <input type="text" [(ngModel)]="variantForm.code" [ngModelOptions]="{standalone: true}" class="form-input">
                <div class="input-line"></div>
                <i class="fas fa-hashtag input-icon"></i>
              </div>
            </div>

            <div class="form-group half">
              <label class="form-label">
                <i class="fas fa-star"></i>
                Variant Principal
              </label>
              <label class="toggle-switch">
                <input type="checkbox" [(ngModel)]="variantForm.isMain" [ngModelOptions]="{standalone: true}">
                <span class="toggle-slider"></span>
                <span class="toggle-label">{{ variantForm.isMain ? 'Oui' : 'Non' }}</span>
              </label>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label class="form-label">
                <i class="fas fa-euro-sign"></i>
                Prix
              </label>
              <div class="input-wrapper">
                <input type="number" [(ngModel)]="variantForm.price" [ngModelOptions]="{standalone: true}" class="form-input" min="0" step="0.01">
                <div class="input-line"></div>
                <i class="fas fa-euro-sign input-icon"></i>
              </div>
            </div>

            <div class="form-group half">
              <label class="form-label">
                <i class="fas fa-boxes"></i>
                Stock
              </label>
              <div class="input-wrapper">
                <input type="number" [(ngModel)]="variantForm.stock" [ngModelOptions]="{standalone: true}" class="form-input" min="0">
                <div class="input-line"></div>
                <i class="fas fa-cubes input-icon"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- Spécifications -->
        <div class="form-section specifications-section">
          <div class="section-header">
            <label class="section-title">
              <i class="fas fa-list-ul"></i>
              Attributs Spécifiques
            </label>
          </div>
          <div class="table-container">
            <table class="specifications-table">
              <thead>
              <tr>
                <th>Attribut</th>
                <th>Valeur</th>
                <th></th>
              </tr>
              </thead>
              <tbody>
              <tr *ngFor="let spec of specifications" class="spec-row">
                <td>
                  <input type="text" [(ngModel)]="spec.name" [ngModelOptions]="{standalone: true}" class="table-input">
                </td>
                <td>
                  <input type="text" [(ngModel)]="spec.value" [ngModelOptions]="{standalone: true}" class="table-input">
                </td>
                <td>
                  <button type="button" class="btn-delete-row" (click)="removeSpecification(spec.id)">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                </td>
              </tr>
              </tbody>
            </table>
            <button type="button" class="btn-add-spec" (click)="addSpecification()">
              <i class="fas fa-plus"></i> Ajouter un attribut
            </button>
          </div>
        </div>

        <!-- Section Images -->
        <div class="form-section images-section">
          <div class="section-header">
            <label class="section-title">
              <i class="fas fa-images"></i>
              Images
              <span class="images-count" *ngIf="(existingImages.length + newImagePreviews.length) > 0">
                {{ existingImages.length + newImagePreviews.length }}
              </span>
            </label>
          </div>

          <div class="images-body">

            <!-- Images existantes -->
            <ng-container *ngIf="existingImages.length > 0">
              <p class="images-sub-label">
                <i class="fas fa-check-circle"></i> Images actuelles
              </p>
              <div class="thumbnails-grid">
                <div class="thumbnail-card" *ngFor="let img of existingImages">
                  <div class="thumbnail-wrapper">
                    <img [src]="serveurUrl + (img.url.startsWith('/') ? img.url : '/' + img.url)" alt="Image existante" class="thumbnail-img">
                    <div class="thumbnail-overlay">
                      <button type="button" class="btn-thumb-delete" (click)="markImageForDeletion(img)" title="Supprimer">
                        <i class="fas fa-trash"></i>
                      </button>
                    </div>
                  </div>
                  <span class="thumbnail-name thumbnail-name--existing">Actuelle</span>
                </div>
              </div>
            </ng-container>

            <!-- Séparateur si les deux groupes sont présents -->
            <div class="images-divider" *ngIf="existingImages.length > 0 && newImagePreviews.length > 0">
              <span>Nouvelles images</span>
            </div>

            <!-- Nouvelles images prévisualisées -->
            <div class="thumbnails-grid" *ngIf="newImagePreviews.length > 0">
              <div class="thumbnail-card thumbnail-card--new" *ngFor="let preview of newImagePreviews; let i = index">
                <div class="thumbnail-wrapper">
                  <img [src]="preview" alt="Aperçu {{ i + 1 }}" class="thumbnail-img">
                  <div class="thumbnail-overlay">
                    <button type="button" class="btn-thumb-delete" (click)="removeNewImage(i)" title="Supprimer">
                      <i class="fas fa-trash"></i>
                    </button>
                  </div>
                </div>
                <span class="thumbnail-name thumbnail-name--new">
                  <i class="fas fa-plus-circle"></i> Nouveau
                </span>
              </div>
            </div>

            <!-- Zone d'ajout -->
            <div class="upload-zone" (click)="fileInput.click()">
              <input #fileInput type="file" multiple accept="image/*" (change)="onFileSelected($event)" hidden>
              <i class="fas fa-cloud-upload-alt upload-icon"></i>
              <p class="upload-label">Ajouter de nouvelles images</p>
              <span class="upload-hint">PNG, JPG, WEBP · max 10 MB</span>
            </div>

          </div>
        </div>

      </form>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <div class="footer-actions">
        <button type="button" class="btn btn-secondary" (click)="onClose()">
          <i class="fas fa-times"></i> Annuler
        </button>
        <button type="button" class="btn btn-primary" (click)="onSave()" [disabled]="isSubmitting">
          <i class="fas" [class.fa-check]="!isSubmitting" [class.fa-spinner]="isSubmitting" [class.fa-spin]="isSubmitting"></i>
          {{ isSubmitting ? 'Mise à jour...' : 'Enregistrer' }}
        </button>
      </div>
    </div>

  </div>
</div>
